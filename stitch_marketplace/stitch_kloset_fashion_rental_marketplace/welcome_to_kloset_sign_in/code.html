<!-- Tabs -->

<button class="flex-1 pb-4 text-center font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors uppercase tracking-widest border-b-2 border-transparent" id="tab-register" onclick="switchTab('register')">Register</button>
</div>
<!-- Login Form -->
<div class="space-y-6 block transition-opacity duration-300" id="form-login">
<div class="space-y-1">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="login-email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 focus:border-primary py-3 px-0 font-body-md text-on-surface transition-colors placeholder:text-outline/50" id="login-email" placeholder="muse@example.com" type="email"/>
</div>
<div class="space-y-1">
<div class="flex justify-between items-baseline">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider" for="login-password">Password</label>

<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 focus:border-primary py-3 px-0 font-body-md text-on-surface transition-colors placeholder:text-outline/50" id="login-password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" data-icon="visibility" onclick="togglePassword('login-password')" type="button">

</div>
</div>

                        Sign In
                    </button>
</div>

</div>
<div class="space-y-1">

<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');

            if (tab === 'login') {
                // Style Tabs
                loginTab.classList.add('text-primary', 'border-primary');
                loginTab.classList.remove('text-on-surface-variant', 'border-transparent');
                registerTab.classList.remove('text-primary', 'border-primary');
                registerTab.classList.add('text-on-surface-variant', 'border-transparent');

                // Toggle Forms with transition
                registerForm.classList.remove('opacity-100');
                registerForm.classList.add('opacity-0');
                
                setTimeout(() => {
                    registerForm.classList.add('hidden');
                    registerForm.classList.remove('block');
                    loginForm.classList.remove('hidden');
                    loginForm.classList.add('block');
                    
                    // Small delay to allow display block to apply before opacity transition
                    requestAnimationFrame(() => {
                        loginForm.classList.remove('opacity-0');
                        loginForm.classList.add('opacity-100');
                    });
                }, 300);

            } else {
                // Style Tabs
                registerTab.classList.add('text-primary', 'border-primary');
                registerTab.classList.remove('text-on-surface-variant', 'border-transparent');
                loginTab.classList.remove('text-primary', 'border-primary');
                loginTab.classList.add('text-on-surface-variant', 'border-transparent');

                // Toggle Forms with transition
                loginForm.classList.remove('opacity-100');
                loginForm.classList.add('opacity-0');

                setTimeout(() => {
                    loginForm.classList.add('hidden');
                    loginForm.classList.remove('block');
                    registerForm.classList.remove('hidden');
                    registerForm.classList.add('block');
                    
                    requestAnimationFrame(() => {
                        registerForm.classList.remove('opacity-0');
                        registerForm.classList.add('opacity-100');
                    });
                }, 300);
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
